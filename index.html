<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>🌡 たいおんきろく</title>
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #e8f8f5; font-family: sans-serif; }

    /* ---- 共通：画面レイアウト ---- */
    .screen {
      position: fixed;
      inset: 0;
      background: #e8f8f5;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 20;
      padding: 24px;
    }
    .screen.visible { display: flex; }
    .screen .big-icon  { font-size: 3rem; }
    .screen .app-title { font-size: 1.3rem; font-weight: bold; color: #2c3e50; }
    .screen .section-title {
      font-size: 0.95rem; font-weight: bold; color: #2c3e50;
      width: 100%; max-width: 320px; margin-top: 8px;
    }
    .screen input {
      padding: 12px 16px;
      border: 2px solid #b2dfdb;
      border-radius: 10px;
      font-size: 1rem;
      background: white;
      color: #2c3e50;
      width: 100%;
      max-width: 320px;
    }
    .screen input:focus { outline: none; border-color: #27ae60; }
    .btn-primary {
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px 32px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
      margin-top: 4px;
    }
    .btn-secondary {
      background: transparent;
      color: #7f8c8d;
      border: 1px solid #b2dfdb;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.85rem;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
    }
    .error-msg  { color: #e74c3c; font-size: 0.85rem; min-height: 1.2em; max-width: 320px; text-align: center; }
    .hint-text  { color: #95a5a6; font-size: 0.78rem; max-width: 320px; text-align: center; line-height: 1.6; }
    .divider    { border: none; border-top: 1px solid #b2dfdb; width: 100%; max-width: 320px; margin: 6px 0; }

    /* ---- ローディング画面 ---- */
    #loading {
      position: fixed;
      inset: 0;
      background: #e8f8f5;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
    }
    #loading.visible { display: flex; }
    #loading .big-icon  { font-size: 4rem; }
    #loading .app-title { font-size: 1.4rem; font-weight: bold; color: #2c3e50; }
    #loading .spinner {
      width: 44px; height: 44px;
      border: 4px solid #b2dfdb;
      border-top-color: #27ae60;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #loading .msg { font-size: 0.95rem; color: #7f8c8d; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- メインiframe ---- */
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

  <!-- ① 初期設定画面（GAS URLが未登録のとき表示） -->
  <div id="setup-screen" class="screen">
    <div class="big-icon">🌡️</div>
    <div class="app-title">たいおんきろく</div>

    <div class="section-title">⚙️ はじめての設定</div>

    <div class="section-title" style="margin-top:4px;">GASのURL</div>
    <input type="url" id="setup-gas-url"
           placeholder="https://script.google.com/macros/s/..."
           inputmode="url" autocomplete="off">

    <div class="section-title">アクセスキー</div>
    <input type="password" id="setup-api-key"
           placeholder="管理者が設定したキー"
           inputmode="text" autocomplete="off">

    <div id="setup-error" class="error-msg"></div>

    <button class="btn-primary" onclick="saveSetup()">設定を保存してはじめる</button>

    <div class="hint-text">
      GASのデプロイURLとアクセスキーは<br>管理者にご確認ください
    </div>
  </div>

  <!-- ② アクセスキー入力画面（GAS URLは登録済み、キーが未保存のとき） -->
  <div id="key-screen" class="screen">
    <div class="big-icon">🌡️</div>
    <div class="app-title">たいおんきろく</div>

    <input type="password" id="api-key-input"
           placeholder="アクセスキー"
           inputmode="text" autocomplete="off">
    <div id="key-error" class="error-msg"></div>

    <button class="btn-primary" onclick="submitKey()">はいる</button>

    <hr class="divider">
    <button class="btn-secondary" onclick="resetSetup()">⚙ GASのURLを変更する</button>
  </div>

  <!-- ③ よみこみ中 -->
  <div id="loading">
    <div class="big-icon">🌡️</div>
    <div class="app-title">たいおんきろく</div>
    <div class="spinner"></div>
    <div class="msg">よみこみ中…</div>
  </div>

  <!-- ④ GASアプリ本体（認証後にsrcをセット） -->
  <iframe id="app-frame" src=""
    allow="clipboard-read; clipboard-write" allowfullscreen
    onload="onFrameLoad()"></iframe>

  <script>
    // localStorage に保存するキー名
    const GROUP_ID  = new URLSearchParams(location.search).get('group') || 'default';
    const KEY_GAS   = 'taion_gas_url';
    const KEY_API   = 'taion_api_key_' + GROUP_ID;

    // ---- 起動時：保存済みの設定を確認 ----
    window.addEventListener('load', () => {
      const gasUrl = localStorage.getItem(KEY_GAS);

      if (!gasUrl) {
        // GAS URLが未設定 → 初期設定画面を表示
        show('setup-screen');
        return;
      }

      const apiKey = localStorage.getItem(KEY_API);
      if (apiKey) {
        // キーも保存済み → 自動接続
        loadApp(gasUrl, apiKey);
      } else {
        // GAS URLはあるがキーがない → キー入力画面
        show('key-screen');
      }
    });

    // ---- 画面切り替え ----
    function show(id) {
      ['setup-screen', 'key-screen'].forEach(s => {
        document.getElementById(s).classList.toggle('visible', s === id);
      });
    }

    // ---- 初期設定を保存 ----
    function saveSetup() {
      const url = document.getElementById('setup-gas-url').value.trim();
      const key = document.getElementById('setup-api-key').value.trim();
      const err = document.getElementById('setup-error');

      if (!url) {
        err.textContent = 'GASのURLを入力してください';
        return;
      }
      if (!url.startsWith('https://script.google.com/')) {
        err.textContent = 'GASのURLが正しくありません（https://script.google.com/ で始まるURLを入力）';
        return;
      }
      err.textContent = '';

      localStorage.setItem(KEY_GAS, url);

      if (key) {
        // アクセスキーも入力されていれば即接続
        localStorage.setItem(KEY_API, key);
        loadApp(url, key);
      } else {
        // キーは次の画面で入力
        show('key-screen');
      }
    }

    // ---- アクセスキーを送信 ----
    function submitKey() {
      const gasUrl = localStorage.getItem(KEY_GAS);
      const key    = document.getElementById('api-key-input').value.trim();
      if (!key) {
        document.getElementById('key-error').textContent = 'キーをにゅうりょくしてください';
        return;
      }
      loadApp(gasUrl, key);
    }

    // ---- GASをiframeに読み込む ----
    function loadApp(gasUrl, key) {
      show('');   // すべての画面を非表示
      document.getElementById('loading').classList.add('visible');
      const params = new URLSearchParams({ key, group: GROUP_ID });
      document.getElementById('app-frame').src = gasUrl + '?' + params.toString();
      localStorage.setItem(KEY_API, key);
    }

    // ---- GAS URLをリセット（別の施設に切り替えたいとき） ----
    function resetSetup() {
      if (!confirm('GASのURLとアクセスキーをリセットします。\nよろしいですか？')) return;
      localStorage.removeItem(KEY_GAS);
      localStorage.removeItem(KEY_API);
      location.reload();
    }

    // ---- iframeの読み込み完了 ----
    function onFrameLoad() {
      document.getElementById('loading').classList.remove('visible');
    }

    // ---- Enterキーで送信 ----
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('setup-screen').classList.contains('visible')) saveSetup();
      else if (document.getElementById('key-screen').classList.contains('visible')) submitKey();
    });
  </script>
</body>
</html>
